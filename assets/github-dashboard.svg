<svg width="900" height="300" viewBox="0 0 900 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub dashboard</title>
  <desc id="desc">A local animated GitHub profile dashboard for wajipu with repositories, followers, languages, and selected focus areas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="84" y1="0" x2="816" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6"/>
      <stop offset="0.45" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .label { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .value { font: 800 38px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .muted { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .pulse { animation: pulse 2.6s ease-in-out infinite; transform-origin: center; }
      .slide { animation: slide 4.8s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: .72; transform: scale(1); } 50% { opacity: 1; transform: scale(1.025); } }
      @keyframes slide { 0%,100% { transform: translateX(0); } 50% { transform: translateX(18px); } }
    </style>
  </defs>

  <rect x="1" y="1" width="898" height="298" rx="24" fill="url(#bg)" stroke="#334155" stroke-width="2"/>
  <text x="450" y="48" fill="#F8FAFC" text-anchor="middle" class="title">GitHub Dashboard</text>
  <text x="450" y="74" fill="#94A3B8" text-anchor="middle" class="muted">backend · native integration · automation</text>

  <g class="pulse">
    <rect x="60" y="102" width="180" height="86" rx="18" fill="#0B1220" stroke="#1E3A8A"/>
    <text x="86" y="132" fill="#93C5FD" class="label">Public repos</text>
    <text x="86" y="173" fill="#F8FAFC" class="value">15</text>
  </g>
  <g class="pulse">
    <rect x="260" y="102" width="180" height="86" rx="18" fill="#0B1220" stroke="#134E4A"/>
    <text x="286" y="132" fill="#5EEAD4" class="label">Followers</text>
    <text x="286" y="173" fill="#F8FAFC" class="value">2</text>
  </g>
  <g class="pulse">
    <rect x="460" y="102" width="180" height="86" rx="18" fill="#0B1220" stroke="#581C87"/>
    <text x="486" y="132" fill="#D8B4FE" class="label">Main stack</text>
    <text x="486" y="166" fill="#F8FAFC" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800">Java · Rust · Go</text>
  </g>
  <g class="pulse">
    <rect x="660" y="102" width="180" height="86" rx="18" fill="#0B1220" stroke="#7C2D12"/>
    <text x="686" y="132" fill="#FDBA74" class="label">Tools</text>
    <text x="686" y="166" fill="#F8FAFC" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800">Swift · Flutter</text>
  </g>

  <rect x="60" y="218" width="780" height="12" rx="6" fill="#1E293B"/>
  <rect x="60" y="218" width="210" height="12" rx="6" fill="#7F1D1D"/>
  <rect x="270" y="218" width="160" height="12" rx="6" fill="#431407"/>
  <rect x="430" y="218" width="145" height="12" rx="6" fill="#164E63"/>
  <rect x="575" y="218" width="125" height="12" rx="6" fill="#7C2D12"/>
  <rect x="700" y="218" width="140" height="12" rx="6" fill="#1E3A8A"/>

  <g class="slide">
    <circle cx="60" cy="224" r="7" fill="#38BDF8" filter="url(#glow)"/>
  </g>

  <g class="muted">
    <text x="60" y="258" fill="#FCA5A5">Java</text>
    <text x="180" y="258" fill="#FED7AA">Rust</text>
    <text x="300" y="258" fill="#CFFAFE">Go</text>
    <text x="420" y="258" fill="#FDBA74">Swift</text>
    <text x="540" y="258" fill="#BFDBFE">Flutter</text>
    <text x="660" y="258" fill="#E9D5FF">Automation</text>
  </g>

  <path d="M74 88H826" stroke="url(#accent)" stroke-width="3" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="40 760;240 560;40 760" dur="5s" repeatCount="indefinite"/>
  </path>
</svg>
